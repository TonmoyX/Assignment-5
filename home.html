    <main class="max-w-[1110px] mx-auto mt-[60px]">
        <section id="btnContainer" class="bg-gray-100 py-[24px] pl-[24px] rounded-xl gap-2">

            <button id="closeBtn" class="btn w-[120px]">Close</button>

                    <div class="ml-[10px]">
                        <p class="text-[1.4rem] font-semibold" id="issueCount">0<span> Issues</span></p>
                        <p class="text-[#64748B] ">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex pr-[24px] items-center gap-4">
                    <h2 class="text-green-300"><i class="fa-solid fa-circle"> </i><span class="text-black"> Open</span></h2>
                    <h2 class="text-purple-400"><i class="fa-solid fa-circle"> </i><span class="text-black"> Close</span></h2>
                </div>
            </div>
        </section>
